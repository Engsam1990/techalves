services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev:client -- --host 0.0.0.0"
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    working_dir: /app/server
    volumes:
      - ./server:/app/server
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:4000"
